<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Lists — Paradox of Acceptance</title>
<meta name="description" content="Curated reading paths through mindfulness essays — guided sequences for beginners, advanced readers, and specific topics.">
<link rel="alternate" type="application/atom+xml" title="Paradox of Acceptance" href="/feed.xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #FFFFFF; color: #111111; }
a { color: inherit; text-decoration: none; }

/* Layout */
.nav { display: flex; align-items: center; justify-content: space-between; padding: 24px 280px; }
.page-header { padding: 64px 280px 48px; border-bottom: 1px solid #EEEEEE; }
.section { padding: 48px 280px; }
.footer { padding: 48px 280px; }

/* Nav */
.nav-logo { font-family: 'Newsreader', serif; font-size: 20px; font-weight: 500; color: #111; }
.nav-links { display: flex; align-items: center; gap: 36px; }
.nav-links a { font-size: 13px; font-weight: 500; color: #666; transition: color 0.15s; }
.nav-links a:hover { color: #111; }
.nav-links a.active { color: #111; }

/* Page header */
.page-kicker { font-size: 12px; font-weight: 600; color: #999; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
.page-title { font-family: 'Newsreader', serif; font-size: 40px; font-weight: 400; color: #111; margin-bottom: 16px; }
.page-desc { font-size: 16px; color: #666; line-height: 1.65; max-width: 560px; }

/* Collection grid */
.collections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

/* Collection card */
.collection-card {
  display: block;
  border: 1px solid #E8E8E8;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  text-decoration: none;
  color: inherit;
  background: #fff;
}
.collection-card:hover { border-color: #CCC; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

.card-cover {
  height: 140px;
  background: #F5F5F5;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.card-cover img { width: 100%; height: 100%; object-fit: cover; }
.card-cover-placeholder {
  font-family: 'Newsreader', serif;
  font-size: 32px;
  color: #DDD;
  letter-spacing: -1px;
}

/* Progress bar on cover */
.card-progress-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: #EEEEEE;
}
.card-progress-fill {
  height: 100%;
  background: #7d8c6e;
  transition: width 0.3s ease;
}

.card-body { padding: 20px; }
.card-title { font-family: 'Newsreader', serif; font-size: 22px; color: #111; margin-bottom: 8px; line-height: 1.3; }
.card-desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 14px; }
.card-meta { display: flex; align-items: center; gap: 16px; font-size: 12px; color: #AAA; }

.card-preview { padding: 0 20px 16px; }
.card-preview-label { font-size: 10px; font-weight: 600; color: #CCC; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.card-preview-essays { display: flex; flex-direction: column; gap: 4px; }
.card-preview-essay { font-size: 12px; color: #999; line-height: 1.4; }
.card-preview-essay::before { content: "—  "; }

/* Empty state */
.empty-state { text-align: center; padding: 80px 0; }
.empty-state-title { font-family: 'Newsreader', serif; font-size: 24px; color: #999; margin-bottom: 12px; }
.empty-state-sub { font-size: 14px; color: #CCC; }

/* Loading */
.loading-state { text-align: center; padding: 80px 0; }
.loading-dots { display: inline-flex; gap: 6px; }
.loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #DDD; animation: pulse 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* Footer */
.footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #EEEEEE; padding-top: 24px; padding-bottom: 24px; }
.footer-logo { font-family: 'Newsreader', serif; font-size: 16px; color: #111; }
.footer-links { display: flex; flex-wrap: wrap; gap: 24px; }
.footer-links a { font-size: 13px; color: #666; transition: color 0.15s; }
.footer-links a:hover { color: #111; }

/* Responsive */
@media (max-width: 900px) {
  .nav, .page-header, .section, .footer { padding-left: 24px; padding-right: 24px; }
  .page-title { font-size: 32px; }
  .collections-grid { grid-template-columns: 1fr; }
}
</style>
<script defer data-domain="paradoxofacceptance.xyz" src="https://plausible.io/js/script.js"></script>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div style="display:flex;align-items:center;gap:48px;">
    <a href="/" class="nav-logo">Paradox of Acceptance</a>
    <div class="nav-links">
      <a href="/#start-here">Tools</a>
      <a href="/mindfulness-essays/">Essays</a>
      <a href="/mindfulness-wiki/">Wiki</a>
      <a href="/pass/">Pass</a>
      <a href="/search/">Search</a>
    </div>
  </div>
</nav>

<!-- Page header -->
<div class="page-header">
  <div class="page-kicker">Reading Lists</div>
  <h1 class="page-title">Guided Reading Paths</h1>
  <p class="page-desc">Curated sequences of essays for different stages of practice — reducing decision fatigue and building depth.</p>
</div>

<!-- Collections -->
<div class="section">
  <div id="collections-container">
    <div class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<!-- Footer -->
<hr class="divider" style="border:none;border-top:1px solid #EEE;">
<footer class="footer">
  <span class="footer-logo">Paradox of Acceptance</span>
  <div class="footer-links">
    <a href="/mindfulness-essays/">Essays</a>
    <a href="/reading-lists/">Reading Lists</a>
    <a href="/mindfulness-wiki/">Wiki</a>
    <a href="/pass/">Pass</a>
    <a href="/newsletter/">Newsletter</a>
    <a href="/about/">About</a>
    <a href="/privacy/">Privacy</a>
  </div>
</footer>

<script>
(function () {
  'use strict';

  var API_BASE = 'https://paradoxofacceptance.xyz';
  var LIST_PAGE = '/reading-lists/list/';

  // Load progress from localStorage for all lists
  function getListProgress(slug, total) {
    try {
      var key = 'poa_list_' + slug;
      var data = JSON.parse(localStorage.getItem(key) || 'null');
      if (!data || !Array.isArray(data.completedSlugs)) return 0;
      return total > 0 ? Math.min(data.completedSlugs.length / total, 1) : 0;
    } catch (e) { return 0; }
  }

  function buildCard(list) {
    var progress = getListProgress(list.slug, list.item_count);
    var progressPct = Math.round(progress * 100);

    var previewHtml = '';
    if (list.preview_essays && list.preview_essays.length > 0) {
      previewHtml = '<div class="card-preview"><div class="card-preview-label">In this list</div><div class="card-preview-essays">' +
        list.preview_essays.map(function (e) {
          return '<span class="card-preview-essay">' + escHtml(e.title) + '</span>';
        }).join('') +
        (list.item_count > 3 ? '<span class="card-preview-essay" style="color:#CCC;">+ ' + (list.item_count - 3) + ' more</span>' : '') +
        '</div></div>';
    }

    var coverHtml;
    if (list.cover_image_url && !list.cover_image_url.endsWith('og-image.jpg')) {
      coverHtml = '<img src="' + escHtml(list.cover_image_url) + '" alt="' + escHtml(list.title) + '" loading="lazy">';
    } else {
      coverHtml = '<span class="card-cover-placeholder">' + escHtml(list.title.charAt(0)) + '</span>';
    }

    var progressBarHtml = progress > 0
      ? '<div class="card-progress-bar"><div class="card-progress-fill" style="width:' + progressPct + '%"></div></div>'
      : '';

    var metaStr = list.item_count + ' essay' + (list.item_count !== 1 ? 's' : '') +
      ' &nbsp;&middot;&nbsp; ~' + list.estimated_read_minutes + ' min total';

    if (progress > 0 && progress < 1) {
      metaStr += ' &nbsp;&middot;&nbsp; ' + progressPct + '% read';
    } else if (progress >= 1) {
      metaStr += ' &nbsp;&middot;&nbsp; Complete';
    }

    return '<a href="' + LIST_PAGE + '?slug=' + encodeURIComponent(list.slug) + '" class="collection-card">' +
      '<div class="card-cover">' + coverHtml + progressBarHtml + '</div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + escHtml(list.title) + '</div>' +
        (list.description ? '<div class="card-desc">' + escHtml(list.description) + '</div>' : '') +
        '<div class="card-meta">' + metaStr + '</div>' +
      '</div>' +
      previewHtml +
      '</a>';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  fetch(API_BASE + '/api/reading-lists')
    .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function (data) {
      var container = document.getElementById('collections-container');
      var lists = data.reading_lists || [];

      if (lists.length === 0) {
        container.innerHTML = '<div class="empty-state">' +
          '<div class="empty-state-title">No reading lists yet</div>' +
          '<div class="empty-state-sub">Check back soon — curated paths are on the way.</div>' +
          '</div>';
        return;
      }

      var html = '<div class="collections-grid">';
      lists.forEach(function (list) { html += buildCard(list); });
      html += '</div>';
      container.innerHTML = html;
    })
    .catch(function () {
      var container = document.getElementById('collections-container');
      container.innerHTML = '<div class="empty-state">' +
        '<div class="empty-state-title">Could not load reading lists</div>' +
        '<div class="empty-state-sub">Refresh the page to try again.</div>' +
        '</div>';
    });
})();
</script>

</body>
</html>
