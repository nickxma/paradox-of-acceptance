/* Layout */

}

/* Results */

.result-row {

  color: inherit;
}
.result-row:hover { background: #FAFAFA; margin-left: -12px; margin-right: -12px; padding-left: 12px; padding-right: 12px; border-radius: 6px; }
.result-row:last-child { border-bottom: none; }
.result-kicker { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.result-title { font-family: 'Newsreader', serif; font-size: 28px; color: #111; margin-bottom: 8px; line-height: 1.3; }
.result-excerpt { font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 12px; max-width: 600px; }
.result-excerpt mark { background: #FEF9C3; color: inherit; padding: 1px 2px; border-radius: 2px; }
.result-meta { font-size: 13px; color: #AAA; }

/* Empty state */
.empty-state { padding: 64px 0; text-align: center; }
.empty-state-icon { font-size: 32px; margin-bottom: 16px; color: #DDD; }
.empty-state-title { font-family: 'Newsreader', serif; font-size: 24px; color: #999; margin-bottom: 8px; }
.empty-state-desc { font-size: 15px; color: #BBB; }

/* Initial state (no query yet) */
.initial-state { padding: 48px 0; }
.initial-hint { font-size: 15px; color: #999; }

/* Footer */
.footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #EEEEEE; padding-top: 24px; padding-bottom: 24px; }

/* Responsive */
@media (max-width: 900px) {

  .page-title { font-size: 32px; }
  .footer { flex-direction: column; gap: 16px; align-items: flex-start; }
  .footer-links { gap: 16px; }
  .nav-links { gap: 20px; }

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
(function () {
  var INDEX_URL = '/search-index.json';
  var fuse = null;
  var essays = [];
  var debounceTimer = null;

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function highlightMatches(text, indices) {
    if (!indices || indices.length === 0) return escapeHtml(text);
    var result = '';
    var lastIndex = 0;
    // indices is array of [start, end] pairs (inclusive)
    for (var i = 0; i < indices.length; i++) {
      var start = indices[i][0];
      var end = indices[i][1] + 1;
      result += escapeHtml(text.slice(lastIndex, start));
      result += '<mark>' + escapeHtml(text.slice(start, end)) + '</mark>';
      lastIndex = end;
    }
    result += escapeHtml(text.slice(lastIndex));
    return result;
  }

  function getExcerptWithContext(body, indices, maxLength) {
    maxLength = maxLength || 200;
    if (!indices || indices.length === 0) {
      return escapeHtml(body.slice(0, maxLength)) + (body.length > maxLength ? '…' : '');
    }
    // Find the first match and show context around it
    var firstMatch = indices[0][0];
    var start = Math.max(0, firstMatch - 80);
    var end = Math.min(body.length, firstMatch + maxLength);
    var slice = body.slice(start, end);
    // Adjust indices relative to slice start
    var adjustedIndices = indices
      .filter(function(pair) { return pair[0] >= start && pair[1] < end; })
      .map(function(pair) { return [pair[0] - start, pair[1] - start]; });
    var prefix = start > 0 ? '…' : '';
    var suffix = end < body.length ? '…' : '';
    return prefix + highlightMatches(slice, adjustedIndices) + suffix;
  }

  function renderResults(results, query) {
    var container = document.getElementById('results-container');
    var meta = document.getElementById('results-meta');

    if (results.length === 0) {
      meta.textContent = '';
      container.innerHTML = '<div class="empty-state">' +
        '<div class="empty-state-icon">○</div>' +
        '<div class="empty-state-title">No essays found</div>' +
        '<div class="empty-state-desc">Try a different keyword — acceptance, avoidance, self, quit…</div>' +
        '</div>';
      return;
    }

    meta.textContent = results.length + ' essay' + (results.length === 1 ? '' : 's') + ' found';

    var html = '';
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      var item = r.item;
      var titleHtml = escapeHtml(item.title);
      var excerptHtml = escapeHtml(item.excerpt);

      // Apply highlights from fuse match data
      if (r.matches) {
        for (var j = 0; j < r.matches.length; j++) {
          var m = r.matches[j];
          if (m.key === 'title') {
            titleHtml = highlightMatches(item.title, m.indices);
          } else if (m.key === 'excerpt') {
            excerptHtml = highlightMatches(item.excerpt, m.indices);
          } else if (m.key === 'body') {
            // Show excerpt with body match context
            excerptHtml = getExcerptWithContext(item.body, m.indices, 220);
          }
        }
      }

      html += '<a href="' + escapeHtml(item.slug) + '" class="result-row">' +
        '<div class="result-kicker">Essay · ' + escapeHtml(item.kicker) + '</div>' +
        '<div class="result-title">' + titleHtml + '</div>' +
        '<div class="result-excerpt">' + excerptHtml + '</div>' +
        '<div class="result-meta">~' + escapeHtml(item.readTime) + '</div>' +
        '</a>';
    }
    container.innerHTML = html;
  }

  function renderInitial() {
    document.getElementById('results-meta').textContent = '';
    document.getElementById('results-container').innerHTML =
      '<div class="initial-state"><p class="initial-hint">Start typing to search across all essays.</p></div>';
  }

  function doSearch(query) {
    if (!fuse || !query || query.trim().length === 0) {
      renderInitial();
      return;
    }
    var results = fuse.search(query.trim());
    renderResults(results, query.trim());
  }

  function initFuse(data) {
    essays = data;
    fuse = new Fuse(essays, {
      keys: [
        { name: 'title', weight: 3 },
        { name: 'excerpt', weight: 2 },
        { name: 'tags', weight: 1.5 },
        { name: 'body', weight: 1 }
      ],
      threshold: 0.35,
      includeMatches: true,
      minMatchCharLength: 2,
      ignoreLocation: true
    });

    // Handle URL query param on load
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q');
    if (q) {
      var input = document.getElementById('search-input');
      input.value = q;
      doSearch(q);
    }
  }

  // Load index
  fetch(INDEX_URL)
    .then(function(r) { return r.json(); })
    .then(initFuse)
    .catch(function(err) {
      console.error('Failed to load search index:', err);
    });

  // Wire up input
  document.getElementById('search-input').addEventListener('input', function(e) {
    var q = e.target.value;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      // Update URL without reload
      var url = new URL(window.location.href);
      if (q.trim()) {
        url.searchParams.set('q', q.trim());
      } else {
        url.searchParams.delete('q');
      }
      window.history.replaceState(null, '', url.toString());
      doSearch(q);
    }, 120);
  });
})();
</script>
