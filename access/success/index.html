<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Confirmed — Paradox of Acceptance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #faf8f4;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 48px 40px;
      text-align: center;
    }
    .check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #ecfdf5;
      border-radius: 50%;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Georgia', serif;
      font-size: 28px;
      font-weight: 400;
      color: #111;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    p {
      font-size: 15px;
      color: #555;
      line-height: 1.65;
      margin-bottom: 16px;
    }
    p:last-of-type { margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #333; }
    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #999;
    }
    .footer a { color: #7d8c6e; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <h1>You're in.</h1>
    <p>Your subscription is confirmed. You now have full access to the members area.</p>
    <p>Connect your wallet on the pass page to access members-only content.</p>
    <a href="/pass/?stripe_success=1" class="btn">Go to members area</a>
  </div>
  <div class="footer">
    <a href="https://paradoxofacceptance.xyz">paradoxofacceptance.xyz</a>
  </div>

  <script>
    // Append the session_id from Stripe redirect for optional verification
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    if (sessionId) {
      const btn = document.querySelector('.btn');
      if (btn) {
        btn.href = `/pass/?stripe_success=1&session_id=${encodeURIComponent(sessionId)}`;
      }
    }
  </script>
</body>
</html>
