name: PR Preview

# Deploys PR content to surge.sh and posts preview URL as a PR comment.
# Preview URL: https://paradox-of-acceptance-pr-{number}.surge.sh
#
# Required GitHub repository secret:
#   SURGE_TOKEN  — run `npx surge token` to get this, then add via:
#                  gh secret set SURGE_TOKEN --repo nickxma/paradox-of-acceptance --body '<token>'

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  pull-requests: write
  contents: read

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      PREVIEW_DOMAIN: paradox-of-acceptance-pr-${{ github.event.pull_request.number }}.surge.sh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pass-src/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: pass-src

      - name: Build pass app
        run: npm run build
        working-directory: pass-src
        env:
          VITE_PRIVY_APP_ID: cmmyfvex101cy0clawnzxpur2
          VITE_CONTRACT_ADDRESS: '0x9691107411AFB05b81CfDE537Efc4a00b9b1bB69'
          VITE_CHAIN_ENV: production

      - name: Prepare deployment directory
        run: |
          mkdir -p _deploy
          rsync -a \
            --exclude='_deploy' \
            --exclude='.git' \
            --exclude='pass-src' \
            --exclude='contracts' \
            --exclude='newsletter' \
            --exclude='newsletter-analytics' \
            --exclude='*.sql' \
            --exclude='DEPLOY.md' \
            . _deploy/

      - name: Deploy preview to surge.sh
        run: npx surge --token "$SURGE_TOKEN" _deploy "$PREVIEW_DOMAIN"
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const domain = process.env.PREVIEW_DOMAIN;
            const url = `https://${domain}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = `## Preview deployed\n\n🔗 [${url}](${url})\n\nBuilt from \`${sha}\`. Updates on every push. Removed when PR closes.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          PREVIEW_DOMAIN: ${{ env.PREVIEW_DOMAIN }}

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      PREVIEW_DOMAIN: paradox-of-acceptance-pr-${{ github.event.pull_request.number }}.surge.sh
    steps:
      - name: Tear down surge.sh preview
        run: npx surge --token "$SURGE_TOKEN" teardown "$PREVIEW_DOMAIN"
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        continue-on-error: true

      - name: Comment on closed PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🗑️ Preview deployment removed (PR closed).',
            });
