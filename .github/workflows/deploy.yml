name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pass-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pass-src

      - name: Build pass app
        run: npm run build
        working-directory: pass-src
        env:
          VITE_PRIVY_APP_ID: cmmyfvex101cy0clawnzxpur2
          VITE_CONTRACT_ADDRESS: '0x9691107411AFB05b81CfDE537Efc4a00b9b1bB69'
          VITE_CHAIN_ENV: production

      - name: Prepare deployment directory
        run: |
          mkdir -p _deploy
          # Copy static site content (exclude backend code and build sources)
          rsync -a \
            --exclude='_deploy' \
            --exclude='.git' \
            --exclude='pass-src' \
            --exclude='contracts' \
            --exclude='newsletter' \
            --exclude='newsletter-analytics' \
            --exclude='*.sql' \
            --exclude='DEPLOY.md' \
            . _deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
