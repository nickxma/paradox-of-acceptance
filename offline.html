<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <title>Offline — Paradox of Acceptance</title>
  <link rel="stylesheet" href="/shared/design-tokens.css">
  <link rel="stylesheet" href="/shared/theme-mono.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f4;
      --sage: #7d8c6e;
      --sage-light: #a4b594;
      --sage-dark: #5a6b4e;
      --ink: #2c2c2c;
      --ink-light: #555;
      --rule: #e2ddd6;
      --expand-bg: #f0ede7;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.75;
      min-height: 100vh;
    }

    [data-theme="dark"] body { background: #111; color: #eee; }
    [data-theme="dark"] { --cream: #111; --ink: #eee; --ink-light: #888; --rule: #2a2a2a; --expand-bg: #1a1a1a; }

    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .back-nav {
      margin-bottom: 48px;
    }

    .back-nav a {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: var(--sage);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .back-nav a:hover { text-decoration: underline; }

    .icon {
      font-size: 40px;
      margin-bottom: 24px;
      display: block;
      opacity: 0.5;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 16px;
      color: var(--ink);
    }

    .lead {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      color: var(--ink-light);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .section-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 16px;
    }

    .essay-list {
      list-style: none;
      border-top: 1px solid var(--rule);
    }

    .essay-list li {
      border-bottom: 1px solid var(--rule);
    }

    .essay-list a {
      display: block;
      padding: 16px 0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      color: var(--ink);
      text-decoration: none;
      transition: color 0.15s;
    }

    .essay-list a:hover { color: var(--sage-dark); }

    .essay-list .essay-path {
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 11px;
      color: var(--sage-light);
      margin-top: 3px;
      letter-spacing: 0.02em;
    }

    .empty {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 15px;
      color: var(--ink-light);
      font-style: italic;
    }

    .loading {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--ink-light);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="back-nav">
    <a href="/mindfulness-essays/">← All essays</a>
  </div>

  <span class="icon" aria-hidden="true">✈</span>
  <h1>You're offline</h1>
  <p class="lead">No network connection — but you can still read any essays you've visited or saved for offline.</p>

  <div class="section-label">Available offline</div>
  <ul class="essay-list" id="cached-list">
    <li class="loading">Loading cached essays…</li>
  </ul>
</div>

<script>
(function() {
  var list = document.getElementById('cached-list');

  function titleFromUrl(url) {
    var match = url.match(/\/mindfulness-essays\/([^/]+)\/?$/);
    if (!match) return url;
    return match[1].replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  function renderList(urls) {
    var essays = urls.filter(function(u) {
      return u.includes('/mindfulness-essays/') && !u.endsWith('/mindfulness-essays/');
    });

    if (essays.length === 0) {
      list.innerHTML = '<li class="empty">No essays cached yet. Visit any essay while online to save it.</li>';
      return;
    }

    list.innerHTML = essays.map(function(url) {
      var path = new URL(url).pathname;
      var title = titleFromUrl(path);
      return '<li><a href="' + path + '">' + title +
        '<span class="essay-path">' + path + '</span></a></li>';
    }).join('');
  }

  if (!('serviceWorker' in navigator) || !('caches' in window)) {
    list.innerHTML = '<li class="empty">Offline reading is not available in this browser.</li>';
    return;
  }

  // Ask the service worker for cached essay URLs
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.addEventListener('message', function handler(e) {
      if (e.data && e.data.type === 'CACHED_ESSAYS') {
        navigator.serviceWorker.removeEventListener('message', handler);
        renderList(e.data.urls);
      }
    });
    navigator.serviceWorker.controller.postMessage({ type: 'GET_CACHED_ESSAYS' });
  } else {
    // Fallback: read the cache directly from the page context
    caches.open('essays-v1').then(function(cache) {
      return cache.keys();
    }).then(function(keys) {
      renderList(keys.map(function(r) { return r.url; }));
    }).catch(function() {
      list.innerHTML = '<li class="empty">Could not load cached essays.</li>';
    });
  }
})();
</script>
</body>
</html>
