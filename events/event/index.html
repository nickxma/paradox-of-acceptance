<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — Paradox of Acceptance</title>
<meta name="description" content="Workshop details and registration.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
<script defer data-domain="paradoxofacceptance.xyz" src="https://plausible.io/js/script.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FFFFFF;
  color: #111111;
  font-size: 15px;
  line-height: 1.6;
}

/* ─── Nav ─────────────────────────────────────────────────────────────────── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 280px;
  border-bottom: 1px solid #EEEEEE;
}
.nav-logo {
  font-family: 'Newsreader', serif;
  font-size: 20px;
  font-weight: 500;
  color: #111;
  text-decoration: none;
}
.nav-links { display: flex; align-items: center; gap: 36px; }
.nav-links a {
  font-size: 13px;
  font-weight: 500;
  color: #666;
  text-decoration: none;
  transition: color 0.15s;
}
.nav-links a:hover { color: #111; }
.nav-links a.active { color: #111; }

/* ─── Back link ───────────────────────────────────────────────────────────── */
.back-wrap { max-width: 760px; margin: 0 auto; padding: 28px 24px 0; }
.back-link {
  font-size: 13px;
  color: #999;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: color 0.15s;
}
.back-link:hover { color: #111; }
.back-link::before { content: '←'; }

/* ─── Page layout ─────────────────────────────────────────────────────────── */
.page { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }

/* ─── Event header ─────────────────────────────────────────────────────────── */
.event-header { margin-bottom: 40px; }

.event-meta-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.event-date-label {
  font-size: 12px;
  font-weight: 600;
  color: #999;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-free { background: #F0FDF4; color: #16A34A; }
.badge-paid { background: #F5F3FF; color: #7C3AED; }
.badge-virtual { background: #EFF6FF; color: #2563EB; }
.badge-in-person { background: #FFF7ED; color: #C2410C; }
.badge-soldout { background: #FEF2F2; color: #DC2626; }

.event-title {
  font-family: 'Newsreader', serif;
  font-size: 36px;
  font-weight: 400;
  color: #111;
  line-height: 1.2;
  margin-bottom: 20px;
}

.event-details-row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px 24px;
  background: #FAFAFA;
  border: 1px solid #EEEEEE;
  border-radius: 8px;
}
.event-detail-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.event-detail-label {
  font-size: 11px;
  font-weight: 600;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.event-detail-value {
  font-size: 14px;
  color: #111;
  font-weight: 500;
}

/* ─── Sections ─────────────────────────────────────────────────────────────── */
.section { margin-bottom: 40px; }
.section-title {
  font-family: 'Newsreader', serif;
  font-size: 20px;
  font-weight: 400;
  color: #111;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid #EEEEEE;
}
.section-body {
  font-size: 15px;
  color: #444;
  line-height: 1.75;
  white-space: pre-wrap;
}

/* ─── Register card ────────────────────────────────────────────────────────── */
.register-card {
  border: 1px solid #EEEEEE;
  border-radius: 8px;
  padding: 28px;
  margin-bottom: 40px;
}
.register-card-title {
  font-family: 'Newsreader', serif;
  font-size: 22px;
  font-weight: 400;
  color: #111;
  margin-bottom: 6px;
}
.register-card-sub {
  font-size: 14px;
  color: #666;
  margin-bottom: 24px;
}
.register-price {
  font-size: 22px;
  font-weight: 600;
  color: #111;
  margin-bottom: 4px;
}
.register-price-sub { font-size: 13px; color: #999; margin-bottom: 20px; }
.spots-note { font-size: 13px; color: #999; margin-bottom: 20px; }
.spots-note.few { color: #C2410C; font-weight: 500; }

.form-field { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #444;
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #DDD;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  color: #111;
}
.form-input:focus { border-color: #111; }
.form-error { font-size: 12px; color: #DC2626; margin-top: 6px; min-height: 16px; }

.btn-register {
  width: 100%;
  padding: 12px 24px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-register:hover { background: #333; }
.btn-register:disabled { background: #aaa; cursor: not-allowed; }

/* ─── Payment tabs ──────────────────────────────────────────────────────────── */
.payment-tabs {
  display: flex;
  gap: 0;
  border: 1px solid #DDD;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 20px;
}
.payment-tab {
  flex: 1;
  padding: 9px 16px;
  background: #fff;
  border: none;
  font-size: 13px;
  font-weight: 500;
  color: #666;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.1s, color 0.1s;
}
.payment-tab + .payment-tab { border-left: 1px solid #DDD; }
.payment-tab.active { background: #111; color: #fff; }

/* ─── Soldout card ──────────────────────────────────────────────────────────── */
.soldout-notice {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 40px;
  text-align: center;
}
.soldout-notice strong { display: block; font-size: 16px; color: #991B1B; margin-bottom: 4px; }
.soldout-notice span { font-size: 14px; color: #B91C1C; }

/* ─── Success inline ────────────────────────────────────────────────────────── */
.success-inline {
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 40px;
  text-align: center;
}
.success-inline strong { display: block; font-size: 16px; color: #15803D; margin-bottom: 4px; }
.success-inline span { font-size: 14px; color: #16A34A; }

/* ─── PYUSD section ─────────────────────────────────────────────────────────── */
.pyusd-instructions {
  background: #F8F7FF;
  border: 1px solid #DDD9FF;
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 14px;
  font-size: 13px;
  color: #444;
  line-height: 1.65;
}
.pyusd-instructions strong { color: #111; }
.pyusd-input-row { display: flex; gap: 8px; }
.pyusd-input-row .form-input { flex: 1; }
.pyusd-submit { padding: 10px 20px; white-space: nowrap; }

/* ─── Loading skeleton ─────────────────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 4px;
  display: block;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.sk-title { height: 40px; width: 75%; margin-bottom: 14px; }
.sk-block { height: 16px; margin-bottom: 10px; }
.sk-block.wide { width: 90%; }
.sk-block.narrow { width: 45%; }
.sk-card { height: 200px; margin-bottom: 20px; border-radius: 8px; }

/* ─── Error state ───────────────────────────────────────────────────────────── */
.page-error { padding: 56px 0; text-align: center; color: #999; }
.page-error strong { display: block; font-size: 18px; color: #666; margin-bottom: 8px; }

/* ─── Responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .nav { padding: 20px 32px; }
}
@media (max-width: 600px) {
  .nav { padding: 16px 20px; }
  .nav-links { gap: 20px; }
  .event-title { font-size: 28px; }
  .page { padding: 28px 20px 60px; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">Paradox of Acceptance</a>
  <div class="nav-links">
    <a href="/mindfulness-essays/">Essays</a>
    <a href="/courses/">Courses</a>
    <a href="/events/" class="active">Events</a>
    <a href="/newsletter/">Newsletter</a>
    <a href="/about/">About</a>
  </div>
</nav>

<div class="back-wrap">
  <a href="/events/" class="back-link">All events</a>
</div>

<div class="page" id="page-root">
  <!-- Loading skeleton -->
  <div id="skeleton">
    <div class="event-header">
      <div style="display:flex;gap:10px;margin-bottom:16px;">
        <span class="skeleton sk-block narrow"></span>
      </div>
      <span class="skeleton sk-title"></span>
      <span class="skeleton sk-block wide"></span>
      <span class="skeleton sk-card" style="margin-top:20px;"></span>
    </div>
  </div>
  <div id="content" style="display:none"></div>
  <div id="error" style="display:none" class="page-error">
    <strong>Event not found</strong>
    <a href="/events/" style="color:#7C3AED;font-size:14px;">Browse all events</a>
  </div>
</div>

<script>
'use strict';

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC'
  });
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', timeZoneName: 'short', timeZone: 'UTC'
  });
}

function fmtPrice(cents) {
  if (cents === 0) return 'Free';
  return '$' + (cents / 100).toFixed(0);
}

// ─── Registration state ────────────────────────────────────────────────────────

var paymentTab = 'stripe'; // 'stripe' | 'pyusd'
var registering = false;
var registeredOk = false;

// ─── Slug from URL ─────────────────────────────────────────────────────────────

function getSlug() {
  var p = new URLSearchParams(window.location.search);
  return p.get('slug') || '';
}

// ─── Render ────────────────────────────────────────────────────────────────────

function renderPage(ev) {
  var isSoldOut = ev.spots_remaining !== null && ev.spots_remaining !== undefined && ev.spots_remaining <= 0;
  var isFew = ev.spots_remaining !== null && ev.spots_remaining > 0 && ev.spots_remaining <= 5;
  var isFree = ev.price_cents === 0;
  var hasPyusd = ev.price_pyusd !== null && ev.price_pyusd !== undefined && ev.price_pyusd > 0;
  var isPaid = ev.price_cents > 0;

  // Update page title
  document.title = escHtml(ev.title) + ' — Paradox of Acceptance';
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc && ev.description) metaDesc.setAttribute('content', ev.description.substring(0, 160));

  // Meta badges
  var badges = '';
  if (isSoldOut) {
    badges += '<span class="badge badge-soldout">Sold out</span>';
  } else if (isFree) {
    badges += '<span class="badge badge-free">Free</span>';
  } else {
    badges += '<span class="badge badge-paid">' + escHtml(fmtPrice(ev.price_cents)) + '</span>';
  }
  if (ev.location_type === 'virtual') {
    badges += '<span class="badge badge-virtual">Virtual</span>';
  } else {
    badges += '<span class="badge badge-in-person">In-person</span>';
  }

  // Spots note
  var spotsNote = '';
  if (!isSoldOut && ev.capacity !== null && ev.capacity !== undefined) {
    if (isFew) {
      spotsNote = '<div class="spots-note few">' + ev.spots_remaining + ' spot' + (ev.spots_remaining === 1 ? '' : 's') + ' left — register soon</div>';
    } else if (ev.spots_remaining !== null) {
      spotsNote = '<div class="spots-note">' + ev.spots_remaining + ' spot' + (ev.spots_remaining === 1 ? '' : 's') + ' remaining</div>';
    }
  }

  // Location display
  var locationValue = ev.location_type === 'virtual'
    ? (ev.location ? ev.location : 'Online (link sent upon registration)')
    : (ev.location || 'In-person (details upon registration)');

  // Details row
  var detailsHtml = '<div class="event-details-row">'
    + '<div class="event-detail-item"><div class="event-detail-label">Date</div><div class="event-detail-value">' + escHtml(fmtDate(ev.starts_at)) + '</div></div>'
    + '<div class="event-detail-item"><div class="event-detail-label">Time</div><div class="event-detail-value">' + escHtml(fmtTime(ev.starts_at)) + '</div></div>'
    + '<div class="event-detail-item"><div class="event-detail-label">Location</div><div class="event-detail-value">' + escHtml(locationValue) + '</div></div>'
    + (ev.price_cents > 0 ? '<div class="event-detail-item"><div class="event-detail-label">Price</div><div class="event-detail-value">' + escHtml(fmtPrice(ev.price_cents)) + (hasPyusd ? ' or ' + ev.price_pyusd + ' PYUSD' : '') + '</div></div>' : '')
    + '</div>';

  // Register section
  var registerHtml = '';
  if (isSoldOut) {
    registerHtml = '<div class="soldout-notice"><strong>Sold out</strong><span>This event is at capacity. Check back for future events.</span></div>';
  } else if (isFree) {
    registerHtml = renderRegisterForm(ev, 'free', false);
  } else {
    registerHtml = renderRegisterForm(ev, isPaid && hasPyusd ? 'tabs' : 'stripe', false);
  }

  // Rich sections
  var sectionsHtml = '';
  if (ev.description) {
    sectionsHtml += '<div class="section"><div class="section-title">About this event</div><div class="section-body">' + escHtml(ev.description) + '</div></div>';
  }
  if (ev.agenda) {
    sectionsHtml += '<div class="section"><div class="section-title">Agenda</div><div class="section-body">' + escHtml(ev.agenda) + '</div></div>';
  }
  if (ev.facilitator_bio) {
    sectionsHtml += '<div class="section"><div class="section-title">Facilitator</div><div class="section-body">' + escHtml(ev.facilitator_bio) + '</div></div>';
  }
  if (ev.what_to_bring) {
    sectionsHtml += '<div class="section"><div class="section-title">What to bring</div><div class="section-body">' + escHtml(ev.what_to_bring) + '</div></div>';
  }
  if (ev.faq) {
    sectionsHtml += '<div class="section"><div class="section-title">FAQ</div><div class="section-body">' + escHtml(ev.faq) + '</div></div>';
  }

  var html = '<div class="event-header">'
    + '<div class="event-meta-top"><span class="event-date-label">' + escHtml(fmtDate(ev.starts_at)) + '</span>' + badges + '</div>'
    + '<h1 class="event-title">' + escHtml(ev.title) + '</h1>'
    + detailsHtml
    + '</div>'
    + spotsNote
    + registerHtml
    + sectionsHtml;

  var contentEl = document.getElementById('content');
  contentEl.innerHTML = html;
  contentEl.style.display = '';
  document.getElementById('skeleton').style.display = 'none';

  attachFormHandlers(ev);
}

function renderRegisterForm(ev, mode, showSuccess) {
  if (showSuccess) {
    return '<div class="success-inline" id="register-success">'
      + '<strong>You\'re registered!</strong>'
      + '<span>Check your email for a confirmation and calendar invite.</span>'
      + '</div>';
  }

  var tabsHtml = '';
  var paymentNote = '';
  var submitLabel = '';
  var extraFields = '';

  if (mode === 'free') {
    submitLabel = 'Register for free';
  } else if (mode === 'tabs') {
    tabsHtml = '<div class="payment-tabs">'
      + '<button class="payment-tab' + (paymentTab === 'stripe' ? ' active' : '') + '" onclick="switchTab(\'stripe\')">Credit card</button>'
      + '<button class="payment-tab' + (paymentTab === 'pyusd' ? ' active' : '') + '" onclick="switchTab(\'pyusd\')">PYUSD</button>'
      + '</div>';
    if (paymentTab === 'stripe') {
      submitLabel = 'Continue to payment →';
    } else {
      submitLabel = 'Submit PYUSD registration';
      extraFields = '<div class="pyusd-instructions">'
        + '<strong>PYUSD payment:</strong> Send exactly <strong>' + ev.price_pyusd + ' PYUSD</strong> on Ethereum mainnet to:<br><br>'
        + '<code style="background:#eee;padding:2px 6px;border-radius:3px;font-size:12px;">0x60dFFC7aB012e988A8aC8048bA29f16C6CF067b7</code><br><br>'
        + 'Then paste your transaction hash below to complete registration.'
        + '</div>'
        + '<div class="form-field"><label class="form-label" for="reg-txhash">Transaction hash <span style="color:#DC2626">*</span></label>'
        + '<input class="form-input" type="text" id="reg-txhash" placeholder="0x..." autocomplete="off">'
        + '</div>';
    }
  } else {
    submitLabel = 'Continue to payment →';
  }

  var priceDisplay = '';
  if (ev.price_cents > 0) {
    priceDisplay = '<div class="register-price">' + escHtml(fmtPrice(ev.price_cents)) + '</div>'
      + '<div class="register-price-sub">per person</div>';
  }

  return '<div class="register-card" id="register-card">'
    + '<div class="register-card-title">Reserve your spot</div>'
    + '<div class="register-card-sub">You\'ll receive a confirmation email with a calendar invite.</div>'
    + priceDisplay
    + tabsHtml
    + '<div class="form-field"><label class="form-label" for="reg-name">Name <span style="color:#DC2626">*</span></label>'
    + '<input class="form-input" type="text" id="reg-name" placeholder="Your name" autocomplete="name"></div>'
    + '<div class="form-field"><label class="form-label" for="reg-email">Email <span style="color:#DC2626">*</span></label>'
    + '<input class="form-input" type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"></div>'
    + extraFields
    + '<div class="form-error" id="reg-error"></div>'
    + '<button class="btn-register" id="reg-btn" onclick="submitRegistration(event)">' + submitLabel + '</button>'
    + '</div>';
}

function switchTab(tab) {
  paymentTab = tab;
  var ev = window.__currentEvent;
  if (!ev) return;
  var card = document.getElementById('register-card');
  if (!card) return;
  var nameVal = (document.getElementById('reg-name') || {}).value || '';
  var emailVal = (document.getElementById('reg-email') || {}).value || '';
  card.outerHTML = renderRegisterForm(ev, 'tabs', false);
  // Re-attach after DOM swap
  document.getElementById('register-card').outerHTML = renderRegisterForm(ev, 'tabs', false);
  var nameEl = document.getElementById('reg-name');
  var emailEl = document.getElementById('reg-email');
  if (nameEl) nameEl.value = nameVal;
  if (emailEl) emailEl.value = emailVal;
  attachFormHandlers(ev);
}

function attachFormHandlers(ev) {
  window.__currentEvent = ev;
}

async function submitRegistration(e) {
  e.preventDefault();
  if (registering) return;

  var ev = window.__currentEvent;
  if (!ev) return;

  var name = (document.getElementById('reg-name') || {}).value || '';
  var email = (document.getElementById('reg-email') || {}).value || '';
  var txHash = (document.getElementById('reg-txhash') || {}).value || '';
  var errEl = document.getElementById('reg-error');
  var btn = document.getElementById('reg-btn');

  if (!name.trim()) { errEl.textContent = 'Name is required.'; return; }
  if (!email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
    errEl.textContent = 'A valid email address is required.'; return;
  }
  errEl.textContent = '';

  var slug = getSlug();
  var isFree = ev.price_cents === 0;
  var hasPyusd = ev.price_pyusd !== null && ev.price_pyusd !== undefined && ev.price_pyusd > 0;
  var usePyusd = paymentTab === 'pyusd' && hasPyusd;

  if (usePyusd && !txHash.trim()) {
    errEl.textContent = 'Transaction hash is required for PYUSD payment.'; return;
  }

  registering = true;
  btn.disabled = true;
  btn.textContent = isFree ? 'Registering…' : usePyusd ? 'Submitting…' : 'Redirecting to payment…';

  try {
    if (isFree) {
      var res = await fetch('/api/poa/events/' + encodeURIComponent(slug) + '/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), email: email.trim() }),
      });
      var data = await res.json().catch(() => ({}));
      if (!res.ok) {
        errEl.textContent = data.error || 'Registration failed. Please try again.';
        btn.disabled = false; btn.textContent = 'Register for free'; registering = false; return;
      }
      // Show inline success
      var card = document.getElementById('register-card');
      if (card) card.outerHTML = renderRegisterForm(ev, 'free', true);
    } else if (usePyusd) {
      var res2 = await fetch('/api/poa/events/' + encodeURIComponent(slug) + '/pyusd-register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), email: email.trim(), txHash: txHash.trim() }),
      });
      var data2 = await res2.json().catch(() => ({}));
      if (!res2.ok) {
        errEl.textContent = data2.error || 'Registration failed. Please try again.';
        btn.disabled = false; btn.textContent = 'Submit PYUSD registration'; registering = false; return;
      }
      var card2 = document.getElementById('register-card');
      if (card2) card2.outerHTML = renderRegisterForm(ev, 'tabs', true);
    } else {
      // Stripe checkout
      var res3 = await fetch('/api/poa/events/' + encodeURIComponent(slug) + '/stripe-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), email: email.trim() }),
      });
      var data3 = await res3.json().catch(() => ({}));
      if (!res3.ok) {
        errEl.textContent = data3.error || 'Could not start checkout. Please try again.';
        btn.disabled = false; btn.textContent = 'Continue to payment →'; registering = false; return;
      }
      if (data3.url) { window.location.href = data3.url; return; }
    }
  } catch (err) {
    errEl.textContent = 'Network error. Please try again.';
    btn.disabled = false;
    btn.textContent = isFree ? 'Register for free' : usePyusd ? 'Submit PYUSD registration' : 'Continue to payment →';
    registering = false;
  }
}

// ─── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  var slug = getSlug();
  if (!slug) {
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('error').style.display = '';
    return;
  }

  try {
    var res = await fetch('/api/poa/events/' + encodeURIComponent(slug));
    if (!res.ok) throw new Error('not found');
    var data = await res.json();
    if (!data.event) throw new Error('no event');
    renderPage(data.event);
  } catch (e) {
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('error').style.display = '';
  }
}

init();
</script>
